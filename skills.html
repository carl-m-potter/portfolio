<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills | Carl Potter</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<!-- Progress bar -->
<div class="progress-bar"></div>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-content">
    <div class="nav-brand">
      <img src="/portfolio/images/CP_main_colourless.png" alt="Carl Potter logo">
      <span>Carl Potter</span>
    </div>
    <div class="nav-links">
      <a href="/portfolio/index.html">Home</a>
      <a href="/portfolio/about.html">About</a>
      <a href="/portfolio/index.html#case-studies">Case Studies</a>  
      <a href="/portfolio/skills.html">Skills</a>
      <a href="/portfolio/index.html#contact">Contact</a>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main>
  <section id="skills">
    <h1>Skills</h1>
    <ul>
      <li>User Experience Design (UXD)</li>
      <li>Customer Experience Optimization (CX)</li>
      <li>User Research & Surveys</li>
      <li>Service & Process Design</li>
      <li>Data Analysis & Insights</li>
      <li>Prototyping & Wireframing</li>
    </ul>
  </section>
</main>

<!-- FOOTER -->
<footer id="contact">
  <h2>Contact</h2>
  <p>Get in touch</p>
  <div class="contact-buttons">
    <a href="mailto:cpotter514@gmail.com" class="button">Email Me</a>
    <a href="https://linkedin.com/in/carl-potter-/" target="_blank" class="button">LinkedIn</a>
  </div>
</footer>

<!-- JS -->
<script>
const sections = document.querySelectorAll("section, footer");
const navLinks = document.querySelectorAll(".nav-links a");
const nav = document.querySelector(".navbar");
const progressBar = document.querySelector(".progress-bar");

window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;

  // Active section highlighting
  let current = "";
  sections.forEach(section => {
    const sectionTop = section.offsetTop - 100;
    if (scrollY >= sectionTop) {
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(link => {
    link.classList.remove("active");
    if (link.getAttribute("href").includes(current)) {
      link.classList.add("active");
    }
  });

  // Nav shrink
  nav.classList.toggle("scrolled", scrollY > 50);

  // Scroll progress
  const docHeight = document.body.scrollHeight - window.innerHeight;
  const progress = (scrollY / docHeight) * 100;
  progressBar.style.width = progress + "%";
});
</script>

</body>
</html>
